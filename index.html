<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>数量計算 - 単体完結版</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #1c1c1e;
      --panel2: #2c2c2e;
      --line: #38383a;
      --line2: #636366;
      --text: #ffffff;
      --muted: #aeaeb2;
      --muted2: #8e8e93;
      --accent: #ff9f0a;
      --success: #30d158;
      --btn: #3a3a3c;
      --btn2: #7c7c7e;
      --shadow: 0 8px 24px rgba(0,0,0,.35);
      --radius: 14px;
      --overlay: rgba(0,0,0,0.7);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      overflow: hidden;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; padding: 0; cursor: pointer; }
    select, input, textarea { width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); min-width: 0; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    .app { height: 100dvh; display: flex; flex-direction: column; background: var(--bg); }
    .topbar { padding: max(10px, env(safe-area-inset-top)) 16px 8px; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; }
    .title { font-size: 20px; font-weight: 700; }
    .brand { font-size: 14px; font-weight: 600; color: #d1d1d6; white-space: nowrap; }

    .tabs-wrap { padding: 0 12px 8px; }
    .tabs { display: flex; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 3px; gap: 3px; height: 42px; }
    .tab { flex: 1; border-radius: 9px; color: var(--muted2); font-weight: 700; font-size: 14px; }
    .tab.active { background: var(--btn); color: var(--text); box-shadow: inset 0 0 0 1px var(--accent); }

    .content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }
    .page { max-width: 520px; margin: 0 auto; display: none; gap: 10px; }
    .page.active { display: flex; flex-direction: column; }

    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 2px solid var(--line2); background: rgba(255,255,255,.02); }
    .section-head .left { font-weight: 700; color: var(--accent); }

    .big-result { display: flex; align-items: baseline; gap: 4px; white-space: nowrap; min-height: 36px; }
    .big-result .num { font-size: 30px; font-weight: 800; color: var(--accent); }
    .big-result .unit { color: #d1d1d6; font-weight: 700; }
    .result-detail { padding: 0 12px 12px; color: var(--muted); font-weight: 700; line-height: 1.5; }
    .result-detail .accent { color: var(--accent); }

    .field-row { min-height: 52px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 12px; }
    .field-row:last-child { border-bottom: 0; }
    .field-row.clickable { cursor: pointer; }
    .field-row.focused { background: var(--panel2); box-shadow: inset 0 0 0 1px var(--accent); }
    .label { flex: 0 0 auto; font-weight: 700; white-space: nowrap; min-width: 58px; }
    .value-box { flex: 1; text-align: right; min-width: 0; }
    .value-display { font-size: 26px; font-weight: 600; letter-spacing: .02em; }
    .unit-sm { font-size: 12px; color: var(--muted); margin-left: 5px; }
    .memo-input { text-align: right; font-size: 18px; }

    .history-list { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .history-item, .parts-history-item, .set-card, .master-card { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
    .history-item { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .history-main { min-width: 0; flex: 1; }
    .history-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: baseline; }
    .history-title .div-val { font-size: 12px; color: var(--muted2); font-weight: 600; margin-left: 6px; }
    .history-sub { color: var(--muted); }

    .danger-btn, .icon-btn { padding: 8px; border-radius: 8px; background: rgba(255,255,255,.02); font-weight: 700; color: var(--muted2); }
    .silver-btn { padding: 8px; border-radius: 8px; background: #d1d1d6; color: #1c1c1e; font-weight: 700; }
    .mini-btn { background: var(--btn2); color: #fff; border-radius: 8px; padding: 7px 10px; font-weight: 700; white-space: nowrap; }

    .set-head { display: flex; gap: 8px; align-items: center; border-bottom: 2px solid var(--line2); padding-bottom: 8px; margin-bottom: 8px; }
    .set-title-label { font-weight: 700; color: #d1d1d6; white-space: nowrap; }
    
    .select-wrap, .qty-input-box, .text-wrap {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 40px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      min-width: 0;
    }
    .part-select { flex: 2; }
    .qty-input-box { flex: 1; margin-left: 8px; cursor: pointer; }
    .qty-input-box.focused { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .qty-display { text-align: right; font-weight: 600; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 18px; flex: 1; }

    .row-item { border: 1px solid rgba(255,255,255,.06); border-radius: 10px; padding: 10px; background: rgba(0,0,0,.12); margin-bottom: 8px; }
    .row-top { display: flex; align-items: center; width: 100%; }
    .row-bottom { display: flex; align-items: center; width: 100%; margin-top: 8px; }
    .row-add-btn, .outline-btn, .primary-btn { min-height: 46px; border-radius: 12px; padding: 0 14px; font-weight: 800; }
    .row-add-btn, .outline-btn { border: 1px dashed var(--line2); color: var(--muted); background: rgba(255,255,255,.02); width: 100%; }
    .primary-btn { background: var(--accent); color: #fff; width: 100%; }

    .master-list { display: flex; flex-direction: column; gap: 8px; }
    .master-card { display: flex; flex-direction: column; gap: 8px; }
    .master-head { display: flex; gap: 8px; align-items: center; }
    .master-subtitle { font-size: 13px; color: var(--muted2); font-weight: 700; }
    .part-name-row { display: flex; gap: 8px; align-items: center; }

    .modal-overlay { position: fixed; inset: 0; background: var(--overlay); display: none; align-items: flex-end; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal-content { background: var(--panel); width: 100%; max-width: 520px; border-radius: 20px 20px 0 0; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); animation: slideUp 0.2s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; padding: 0 4px; }
    .modal-context-label { font-size: 15px; font-weight: 700; color: #d1d1d6; min-height: 22px; }
    .modal-result-wrap { display: flex; align-items: baseline; gap: 8px; }
    .modal-total { font-size: 26px; font-weight: 600; color: var(--accent); letter-spacing: .02em; }
    .modal-temp { font-size: 26px; font-weight: 600; color: var(--muted); letter-spacing: .02em; }

    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .key { min-height: 54px; border-radius: 10px; background: var(--btn); color: #fff; font-size: 20px; font-weight: 800; }
    .key.gray { background: var(--btn2); font-size: 15px; }
    .key.orange { background: var(--accent); }
    .key.span2 { grid-row: span 2; min-height: 112px; }
    .key.add-action-key { background: var(--btn); color: var(--accent); }

    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1010; background: var(--success); color: #fff; font-weight: 800; padding: 12px 18px; border-radius: 999px; box-shadow: var(--shadow); display: none; white-space: nowrap; }
    .toast.show { display: block; }
    .mono { font-variant-numeric: tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .bottom {
      position: sticky;
      bottom: 0;
      padding: 8px 12px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.96), rgba(0,0,0,.88));
      border-top: 1px solid var(--line);
    }
    .bottom-inner { max-width: 520px; margin: 0 auto; }
    .bottom-actions { display: flex; gap: 10px; }
    .bottom-actions .outline-btn,
    .bottom-actions .primary-btn {
      flex: 1;
      width: auto;
      min-width: 0;
      justify-content: center;
      display: inline-flex;
      align-items: center;
    }

  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="数量">
  <link rel="apple-touch-icon" href="icon-180.png">

</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">数量計算</div>
      <div class="brand">KYOWA ROOF</div>
    </div>
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab active" data-tab="quantity">数量</button>
        <button class="tab" data-tab="parts">部材</button>
        <button class="tab" data-tab="data">データ</button>
      </div>
    </div>
    <div class="content" id="content">
      <section class="page active" id="page-quantity"></section>
      <section class="page" id="page-parts"></section>
      <section class="page" id="page-data"></section>
    </div>
    <div class="bottom" id="bottom"></div>
  </div>

  <div class="modal-overlay" id="modalKeypad">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-context-label" id="modalContextLabel"></div>
        <div class="modal-result-wrap mono">
          <div class="modal-total" id="modalDisplayTotal">0</div>
          <div class="modal-temp" id="modalDisplayTemp"></div>
        </div>
      </div>
      <div class="keypad" id="modalKeypadContainer"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'construction_calc_v2_final_revision_v3';
      const state = {
        activeTab: 'quantity',
        focusedInput: '',
        qtyMemo: '',
        qtyVal1: '',
        qtyVal2: '',
        qtyHistory: [],
        partsHistory: [],
        masterData: [],
        projectSets: [],
        tempModalVal: '0'
      };

      const el = {
        pageQuantity: document.getElementById('page-quantity'),
        pageParts: document.getElementById('page-parts'),
        pageData: document.getElementById('page-data'),
        bottom: document.getElementById('bottom'),
        toast: document.getElementById('toast'),
        modalKeypad: document.getElementById('modalKeypad'),
        modalKeypadContainer: document.getElementById('modalKeypadContainer'),
        modalDisplayTotal: document.getElementById('modalDisplayTotal'),
        modalDisplayTemp: document.getElementById('modalDisplayTemp'),
        modalContextLabel: document.getElementById('modalContextLabel'),
        tabs: Array.from(document.querySelectorAll('.tab')),
      };

      function uid(p = 'id') { return p + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }
      function safeInt(v, f = 0) { const n = parseInt(String(v), 10); return Number.isFinite(n) ? n : f; }
      function showToast(m) { el.toast.textContent = m; el.toast.classList.add('show'); setTimeout(() => el.toast.classList.remove('show'), 1400); }
      function escapeHtml(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function escapeAttr(v) { return escapeHtml(v).replace(/`/g,'&#96;'); }

      function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          state.masterData = [{ id: uid('m'), title: 'パイプ部材', parts: [{ id: uid('p'), name: '部材A' }] }];
          state.projectSets = [{ id: uid('s'), title: 'パイプ部材', items: [{ id: uid('i'), partName: '部材A', quantity: '' }] }];
        } else {
          try { Object.assign(state, JSON.parse(raw)); } catch (_) { localStorage.removeItem(STORAGE_KEY); loadState(); }
        }
      }

      function setActiveTab(tab) {
        state.activeTab = tab;
        state.focusedInput = '';
        saveState();
        render();
      }

      function setFocusedInput(id) {
        state.focusedInput = id || '';
        if (state.focusedInput && state.focusedInput !== 'memo') {
          state.tempModalVal = '0';
          updateModalDisplay();
          el.modalKeypadContainer.innerHTML = renderKeypadHTML();
          el.modalKeypad.classList.add('show');
          bindModalKeypadEvents();
        }
        render();
      }

      function getFocusedInputLabel() {
        const f = state.focusedInput;
        if (f === 'val1' || f === 'val2') {
          return (state.qtyMemo || '').trim() || '数量計算';
        }
        if (f.startsWith('p-qty-')) {
          const p = f.split('-');
          const set = state.projectSets.find(s => s.id === p[2]);
          const item = set && set.items.find(i => i.id === p[3]);
          const title = (set?.title || '').trim();
          const partName = (item?.partName || '').trim();
          if (title && partName) return `${title} / ${partName}`;
          return title || partName || '部材数量';
        }
        return '';
      }

      function updateModalDisplay() {
        let currentTotal = 0;
        el.modalContextLabel.textContent = getFocusedInputLabel();
        const f = state.focusedInput;
        if (f === 'val1') currentTotal = safeInt(state.qtyVal1, 0);
        else if (f === 'val2') currentTotal = safeInt(state.qtyVal2, 0);
        else if (f.startsWith('p-qty-')) {
          const p = f.split('-');
          const set = state.projectSets.find(s => s.id === p[2]);
          const item = set && set.items.find(i => i.id === p[3]);
          currentTotal = item ? safeInt(item.quantity, 0) : 0;
        }
        el.modalDisplayTotal.textContent = currentTotal;
        el.modalDisplayTemp.textContent = state.tempModalVal !== '0' ? `+ ${state.tempModalVal}` : '';
      }

      function executeModalAdd() {
        const addVal = safeInt(state.tempModalVal, 0);
        const f = state.focusedInput;
        if (f === 'val1') state.qtyVal1 = String(safeInt(state.qtyVal1, 0) + addVal);
        else if (f === 'val2') state.qtyVal2 = String(safeInt(state.qtyVal2, 0) + addVal);
        else if (f.startsWith('p-qty-')) {
          const p = f.split('-');
          state.projectSets = state.projectSets.map(s => (s.id === p[2]) ? { ...s, items: s.items.map(i => i.id === p[3] ? { ...i, quantity: String(safeInt(i.quantity, 0) + addVal) } : i) } : s);
        }
        state.tempModalVal = '0';
        updateModalDisplay();
        saveState();
      }

      function handleKeypadInput(input) {
        if (state.tempModalVal === '0' && input !== '00') state.tempModalVal = String(input);
        else if (state.tempModalVal !== '0') state.tempModalVal += String(input);
        updateModalDisplay();
      }

      function handleClear() { state.tempModalVal = '0'; updateModalDisplay(); }

      function handleAllClear() {
        const f = state.focusedInput;
        if (f === 'val1') state.qtyVal1 = '';
        else if (f === 'val2') state.qtyVal2 = '';
        else if (f.startsWith('p-qty-')) {
          const p = f.split('-');
          state.projectSets = state.projectSets.map(s => (s.id === p[2]) ? { ...s, items: s.items.map(i => i.id === p[3] ? { ...i, quantity: '' } : i) } : s);
        }
        state.tempModalVal = '0';
        updateModalDisplay();
        saveState();
      }

      function renderQuantityPage() {
        const v1 = safeInt(state.qtyVal1, 0); const v2 = safeInt(state.qtyVal2, 0);
        const resValue = v2 > 0 ? Math.ceil(v1 / v2) : 0;
        const fullCount = v2 > 0 ? Math.floor(v1 / v2) : 0;
        const remainder = v2 > 0 ? (v1 % v2) : 0;
        const detailText = v2 > 0
          ? (remainder > 0
              ? `${fullCount}本+${remainder}=<span class="accent mono">${resValue}本</span>`
              : `${fullCount}本=<span class="accent mono">${resValue}本</span>`)
          : '';
        el.pageQuantity.innerHTML = `
          <div class="card">
            <div class="field-row">
              <div class="label">メモ</div>
              <div class="value-box"><input class="memo-input" id="qtyMemoInput" type="text" placeholder="品目" value="${escapeHtml(state.qtyMemo)}"></div>
            </div>
            <div class="field-row clickable" id="qtyVal1Row"><div class="label">数値</div><div class="value-box mono"><span class="value-display">${state.qtyVal1 || '0'}</span><span class="unit-sm">mm</span></div></div>
            <div class="field-row clickable" id="qtyVal2Row"><div class="label">割る寸法</div><div class="value-box mono"><span class="value-display">${state.qtyVal2 || '0'}</span><span class="unit-sm">mm</span></div></div>
          </div>
          <div class="card">
            <div class="section-head"><div class="left">計算結果</div><div class="big-result">${v2 > 0 ? `<span class="num mono">${resValue}</span><span class="unit">本</span>` : ''}</div></div>
            ${v2 > 0 ? `<div class="result-detail mono">${v1}÷${v2} → ${detailText}</div>` : ''}
            <div class="section-head" style="border-bottom:0; background:none;"><div class="left" style="color:var(--muted); font-size: 14px;">履歴</div><button class="mini-btn" id="saveQtyBtn" style="background: var(--accent);">結果を保存</button></div>
            <div class="history-list" id="qh-list">
              ${state.qtyHistory.length ? state.qtyHistory.map(h => {
                const historyText = h.detailText || (() => {
                  const hv1 = safeInt(h.val1, 0);
                  const hv2 = safeInt(h.val2, 0);
                  const hFull = hv2 > 0 ? Math.floor(hv1 / hv2) : 0;
                  const hRem = hv2 > 0 ? (hv1 % hv2) : 0;
                  const hRes = hv2 > 0 ? Math.ceil(hv1 / hv2) : 0;
                  return hRem > 0 ? `${hFull}本+${hRem}=${hRes}本` : `${hFull}本=${hRes}本`;
                })();
                return `
                <div class="history-item"><div class="history-main"><div class="history-title">${escapeHtml(h.memo)} <span class="div-val">÷${safeInt(h.val2, 0)}</span></div><div class="history-sub mono">${historyText}</div></div>
                <button class="danger-btn" data-del-qh="${h.id}">削除</button></div>
              `}).join('') : `<div class="empty-note">履歴はありません</div>`}
            </div>
          </div>
        `;
        
        document.getElementById('qtyVal1Row').onclick = () => setFocusedInput('val1');
        document.getElementById('qtyVal2Row').onclick = () => setFocusedInput('val2');
        const mi = document.getElementById('qtyMemoInput');
        mi.oninput = (e) => { state.qtyMemo = e.target.value; saveState(); };
        mi.onfocus = (e) => { 
          state.focusedInput = 'memo'; 
          // フォーカス時に少し遅延させて全選択を実行（スマホブラウザでの動作安定のため）
          setTimeout(() => { e.target.select(); }, 10);
        };

        document.getElementById('saveQtyBtn').onclick = () => {
          if (v2 <= 0) { showToast('数値を正しく入力してください'); return; }
          state.qtyHistory.unshift({ id: uid('qh'), memo: state.qtyMemo.trim() || '無題', val1: v1, val2: v2, result: resValue, detailText: remainder > 0 ? `${fullCount}本+${remainder}=${resValue}本` : `${fullCount}本=${resValue}本`, time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) });
          saveState(); render(); showToast('保存しました');
        };
        el.pageQuantity.querySelectorAll('[data-del-qh]').forEach(b => b.onclick = () => { state.qtyHistory = state.qtyHistory.filter(x => x.id !== b.dataset.delQh); render(); });
      }

      function renderPartsPage() {
        el.pageParts.innerHTML = `
          ${state.projectSets.map(set => `
            <div class="set-card">
              <div class="set-head">
                <div class="set-title-label">タイトル</div>
                <div class="select-wrap"><select data-sid="${set.id}" class="set-title-select"><option value="">選択</option>${state.masterData.map(m => `<option value="${escapeAttr(m.title)}" ${m.title === set.title ? 'selected' : ''}>${escapeHtml(m.title)}</option>`).join('')}</select></div>
                <button class="silver-btn" data-del-set="${set.id}">削除</button>
              </div>
              <div class="set-list">
                ${set.items.map(item => `
                  <div class="row-item">
                    <div class="row-top">
                      <div class="select-wrap part-select"><select data-sid="${set.id}" data-iid="${item.id}" class="part-name-select"><option value="">部材を選択</option>${(state.masterData.find(m => m.title === set.title)?.parts || []).map(p => `<option value="${escapeAttr(p.name)}" ${p.name === item.partName ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}</select></div>
                    </div>
                    <div class="row-bottom">
                      <div class="qty-input-box" data-qty-focus="p-qty-${set.id}-${item.id}" style="flex:1;margin-left:0;"><div class="label" style="min-width:auto">数量</div><div class="qty-display mono">${item.quantity || '0'}</div><div class="unit-sm">個</div></div>
                      <button class="danger-btn" data-del-item-set="${set.id}" data-del-item-id="${item.id}" style="margin-left:8px;">削除</button>
                    </div>
                  </div>
                `).join('')}
                <button class="row-add-btn" data-add-row="${set.id}">+ 行を追加</button>
              </div>
            </div>
          `).join('')}
          <div class="card"><div class="section-head"><div class="left">保存履歴 (箇条書き)</div></div><div class="parts-history-list" id="ph-list">
              ${state.partsHistory.length ? state.partsHistory.map(h => `<div class="parts-history-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:8px;"><div style="font-weight:800;opacity:.8">${h.date} ${h.time}</div><div style="display:flex;gap:8px;"><button class="icon-btn" data-copy-txt="${encodeURIComponent(h.bulletText)}">コピー</button><button class="danger-btn" data-del-ph="${h.id}">削除</button></div></div><div style="white-space:pre-wrap;line-height:1.6">${escapeHtml(h.bulletText)}</div></div>`).join('') : `<div class="empty-note">履歴はありません</div>`}
          </div></div>
        `;

        el.pageParts.querySelectorAll('.set-title-select').forEach(s => s.onchange = (e) => {
          state.projectSets = state.projectSets.map(x => x.id === s.dataset.sid ? {...x, title: e.target.value} : x);
          saveState(); render();
        });
        el.pageParts.querySelectorAll('.part-name-select').forEach(s => s.onchange = (e) => {
          state.projectSets = state.projectSets.map(x => x.id === s.dataset.sid ? { ...x, items: x.items.map(i => i.id === s.dataset.iid ? { ...i, partName: e.target.value } : i) } : x);
          saveState(); render();
        });
        el.pageParts.querySelectorAll('[data-qty-focus]').forEach(n => n.onclick = () => setFocusedInput(n.dataset.qtyFocus));
        
        // 部材セットの削除
        el.pageParts.querySelectorAll('[data-del-set]').forEach(b => b.onclick = () => { state.projectSets = state.projectSets.filter(s => s.id !== b.dataset.delSet); render(); });
        
        // 部材行（アイテム）の削除
        el.pageParts.querySelectorAll('[data-del-item-set]').forEach(b => b.onclick = () => {
          const sid = b.dataset.delItemSet;
          const iid = b.dataset.delItemId;
          state.projectSets = state.projectSets.map(s => s.id === sid ? { ...s, items: s.items.filter(i => i.id !== iid) } : s);
          saveState(); render();
        });

        el.pageParts.querySelectorAll('[data-add-row]').forEach(b => b.onclick = () => {
          state.projectSets = state.projectSets.map(s => s.id === b.dataset.addRow ? {...s, items:[...s.items,{id:uid('i'),partName:'',quantity:''}]} : s);
          saveState(); render();
        });
        el.pageParts.querySelectorAll('[data-del-ph]').forEach(b => b.onclick = () => { state.partsHistory = state.partsHistory.filter(x => x.id !== b.dataset.delPh); render(); });
        el.pageParts.querySelectorAll('[data-copy-txt]').forEach(b => b.onclick = () => {
          const t = decodeURIComponent(b.dataset.copyTxt);
          const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
          showToast('コピーしました');
        });
      }

      function renderDataPage() {
        el.pageData.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0 2px;">
            <div style="font-weight:800">マスター登録</div>
            <button class="primary-btn" id="addMasterBtn" style="width:auto;min-height:40px;padding:0 16px;">セット追加</button>
          </div>
          <div class="master-list">
            ${state.masterData.map(master => `
              <div class="master-card">
                <div class="master-head">
                  <div class="label" style="min-width:auto">タイトル</div>
                  <div class="text-wrap">
                    <input type="text" data-master-title="${master.id}" value="${escapeAttr(master.title)}" placeholder="名目">
                  </div>
                  <button class="silver-btn" data-delete-master="${master.id}">削除</button>
                </div>
                <div class="master-subtitle">部材名登録</div>
                ${master.parts.map(part => `
                  <div class="part-name-row">
                    <div class="text-wrap"><input type="text" data-master-part="${master.id}" data-part-id="${part.id}" value="${escapeAttr(part.name)}" placeholder="部材名"></div>
                    <button class="danger-btn" data-delete-master-part="${master.id}" data-delete-part-id="${part.id}">削除</button>
                  </div>
                `).join('')}
                <button class="outline-btn" data-add-master-part="${master.id}">+ 部材追加</button>
              </div>
            `).join('')}
          </div>
        `;

        document.getElementById('addMasterBtn').onclick = () => {
          state.masterData.push({ id: uid('m'), title: '', parts: [{ id: uid('p'), name: '' }] });
          saveState(); render();
        };
        el.pageData.querySelectorAll('[data-master-title]').forEach(input => {
          input.oninput = (e) => { state.masterData = state.masterData.map(m => m.id === input.dataset.masterTitle ? { ...m, title: e.target.value } : m); saveState(); };
        });
        el.pageData.querySelectorAll('[data-master-part]').forEach(input => {
          input.oninput = (e) => {
            const masterId = input.dataset.masterPart;
            const partId = input.dataset.partId;
            state.masterData = state.masterData.map(m => m.id === masterId ? { ...m, parts: m.parts.map(p => p.id === partId ? { ...p, name: e.target.value } : p) } : m);
            saveState();
          };
        });
        el.pageData.querySelectorAll('[data-delete-master]').forEach(btn => {
          btn.onclick = () => { state.masterData = state.masterData.filter(m => m.id !== btn.dataset.deleteMaster); render(); };
        });
        el.pageData.querySelectorAll('[data-delete-master-part]').forEach(btn => {
          btn.onclick = () => {
            const masterId = btn.dataset.deleteMasterPart;
            const partId = btn.dataset.deletePartId;
            state.masterData = state.masterData.map(m => m.id === masterId ? { ...m, parts: m.parts.filter(p => p.id !== partId) } : m);
            render();
          };
        });
        el.pageData.querySelectorAll('[data-add-master-part]').forEach(btn => {
          btn.onclick = () => {
            const masterId = btn.dataset.addMasterPart;
            state.masterData = state.masterData.map(m => m.id === masterId ? { ...m, parts: [...m.parts, { id: uid('p'), name: '' }] } : m);
            render();
          };
        });
      }

      function renderKeypadHTML() {
        return `
          <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key gray" data-a="c">C</button>
          <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key gray" data-a="ac">AC</button>
          <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key orange span2" data-a="done">完了</button>
          <button class="key" data-k="0">0</button><button class="key" data-k="00">00</button><button class="key add-action-key" data-a="add">加算</button>
        `;
      }

      function bindModalKeypadEvents() {
        const c = el.modalKeypadContainer;
        c.querySelectorAll('[data-k]').forEach(b => b.onclick = () => handleKeypadInput(b.dataset.k));
        c.querySelector('[data-a="c"]').onclick = handleClear;
        c.querySelector('[data-a="ac"]').onclick = handleAllClear;
        c.querySelector('[data-a="add"]').onclick = executeModalAdd;
        c.querySelector('[data-a="done"]').onclick = () => { 
          executeModalAdd(); 
          el.modalKeypad.classList.remove('show'); 
          state.focusedInput=''; 
          render(); 
        };
      }

      function buildPartsHistoryText() {
        const blocks = state.projectSets.filter(s => (s.title || '').trim() || s.items.length).map(s => {
          const lines = ['■' + (s.title || '無題').trim()];
          s.items.forEach(i => lines.push(` ・${(i.partName || '').trim() || '未選択'}: ${i.quantity || '0'}個`));
          return lines.join('\n');
        });
        return blocks.join('\n\n').trim();
      }

      function renderBottom() {
        if (state.activeTab === 'parts') {
          el.bottom.innerHTML = `<div class="bottom-inner"><div class="bottom-actions"><button class="outline-btn" id="btmAddSet" style="border-style:solid;border-color:var(--accent);color:var(--accent)">セット追加</button><button class="primary-btn" id="btmSavePh">箇条書き保存</button></div></div>`;
          document.getElementById('btmAddSet').onclick = () => { state.projectSets.push({id:uid('s'),title:'',items:[{id:uid('i'),partName:'',quantity:''}]}); render(); };
          document.getElementById('btmSavePh').onclick = () => {
            const txt = buildPartsHistoryText(); if(!txt) { showToast('保存する内容がありません'); return; }
            state.partsHistory.unshift({ id: uid('ph'), date: new Date().toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}), time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}), bulletText: txt });
            render(); showToast('保存しました');
          };
        } else el.bottom.innerHTML = '';
      }

      function render() {
        el.tabs.forEach(b => b.classList.toggle('active', b.dataset.tab === state.activeTab));
        document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + state.activeTab));
        renderQuantityPage(); renderPartsPage(); renderDataPage(); renderBottom();
      }

      el.tabs.forEach(b => b.onclick = () => setActiveTab(b.dataset.tab));
      loadState();
      render();
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || window.location.protocol === 'http:')) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (err) {
          console.error('SW registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
